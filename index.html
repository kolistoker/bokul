<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MHDTVLIV Player</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      background: black;
    }

    #centerLogo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      opacity: 0.9;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #logo {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 100px;
      opacity: 0.8;
      z-index: 10;
    }
  </style>
</head>

<body>

  <!-- Small Logo -->
  <img id="logo" src="https://cric.mhdtvliv.xyz/mhdtvliv.png">

  <!-- Center Logo -->
  <img id="centerLogo" src="https://cric.mhdtvliv.xyz/mhdtvliv.png">

  <!-- Video -->
  <video id="video" autoplay muted playsinline controls></video>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoSrc = urlParams.get('url');

    var video = document.getElementById('video');
    var centerLogo = document.getElementById('centerLogo');

    function startPlayer() {
      if (Hls.isSupported()) {
        var hls = new Hls({
          maxBufferLength: 10,
          maxMaxBufferLength: 20
        });

        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play().catch(() => {});
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function () {
          video.play().catch(() => {});
        });
      }
    }

    startPlayer();

    // Hide center logo when playing
    video.addEventListener('play', function () {
      centerLogo.style.opacity = "0";
    });

    // Show logo when paused
    video.addEventListener('pause', function () {
      centerLogo.style.opacity = "0.9";
    });

    // 🔥 Force autoplay on first user touch (mobile fix)
    document.addEventListener('click', function () {
      video.muted = false; // unmute after interaction
      video.play().catch(() => {});
    });
  </script>

</body>
</html>
